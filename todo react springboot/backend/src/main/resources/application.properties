# Application Name
spring.application.name=todo-app

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
# Update these values according to your local PostgreSQL setup
spring.datasource.url=jdbc:postgresql://localhost:5432/todoapp
spring.datasource.username=postgres
spring.datasource.password=prince
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
# Secret key for signing JWT tokens - CHANGE THIS IN PRODUCTION!
jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnoughToBeSecure2024
jwt.expiration=86400000

# CORS Configuration - Allow frontend origin
# In production, replace with your actual frontend URL
cors.allowedOrigins=http://localhost:3000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.todo=DEBUG
